on: push
name: dotnet-ci
permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          include-prerelease: true
      - name: Restore
        working-directory: ./code/
        run: dotnet restore
  build:
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          include-prerelease: true
      - name: Build
        working-directory: ./code/
        run: dotnet build
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          include-prerelease: true
      - name: Test
        working-directory: ./code/
        run: dotnet test --filter "Category!=Performance" --verbosity normal
